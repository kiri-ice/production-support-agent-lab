name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[dev]"
      - name: Release regression gate
        run: python scripts/run_release_check.py
      - name: Build Python artifacts
        run: python -m build
      - name: Build Docker image
        run: docker build -t production-support-agent-lab:${{ github.ref_name }} .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Production Support Agent Lab ${{ github.ref_name }}" \
            --notes "Release gate passed for ${{ github.sha }}. Includes Python source/wheel artifacts and a reproducible Docker build check." \
            dist/*
